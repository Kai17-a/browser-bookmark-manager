services:
  bookmark-manager:
    container_name: bookmark-manager
    # image: ghcr.io/kai17-a/browser-bookmark-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: /data/bookmark.db
      API_BASE_URL: http://127.0.0.1:${API_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-9500}:3000"
      - "${API_PORT:-9501}:8000"
    volumes:
      - ./local-data:/data
