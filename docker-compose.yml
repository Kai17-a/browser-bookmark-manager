services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: /data/bookmarks.db
    ports:
      - "8000:8000"
    volumes:
      - bookmarks-data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  bookmarks-data:
